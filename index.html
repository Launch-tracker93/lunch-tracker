<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>회사 식비 트래커</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="식비 트래커">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a1a">
<link rel="apple-touch-icon" id="apple-icon">
<link rel="manifest" id="pwa-manifest">
<script>
(function(){
  const c=document.createElement('canvas');
  c.width=512;c.height=512;
  const ctx=c.getContext('2d');
  ctx.fillStyle='#1a1a1a';
  const r=112;
  ctx.beginPath();
  ctx.moveTo(r,0);ctx.lineTo(512-r,0);ctx.quadraticCurveTo(512,0,512,r);
  ctx.lineTo(512,512-r);ctx.quadraticCurveTo(512,512,512-r,512);
  ctx.lineTo(r,512);ctx.quadraticCurveTo(0,512,0,512-r);
  ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);
  ctx.closePath();ctx.fill();
  ctx.font='300px serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('🍱',256,276);
  const iconUrl=c.toDataURL('image/png');
  document.getElementById('apple-icon').href=iconUrl;
  const manifest={name:'회사 식비 트래커',short_name:'식비 트래커',start_url:location.pathname,display:'standalone',background_color:'#f5f4f0',theme_color:'#1a1a1a',icons:[{src:iconUrl,sizes:'512x512',type:'image/png'}]};
  const mBlob=new Blob([JSON.stringify(manifest)],{type:'application/json'});
  document.getElementById('pwa-manifest').href=URL.createObjectURL(mBlob);
})();
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1a1a;min-height:100vh}
.onboard{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 24px;text-align:center}
.onboard-emoji{font-size:52px;margin-bottom:20px}
.onboard h1{font-size:22px;font-weight:700;margin-bottom:8px}
.onboard p{font-size:14px;color:#888;margin-bottom:32px;line-height:1.6}
.onboard input{width:100%;max-width:320px;font-size:17px;padding:14px 16px;border:0.5px solid #ddd;border-radius:14px;background:#fff;color:#1a1a1a;text-align:center;outline:none;margin-bottom:12px;display:block}
.onboard input:focus{border-color:#1a1a1a}
.onboard-btn{width:100%;max-width:320px;background:#1a1a1a;color:#fff;border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:600;cursor:pointer}
.onboard-btn:active{opacity:0.8}
.app{display:none;max-width:480px;margin:0 auto;padding-bottom:80px}
.tab-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:0.5px solid #e5e4e0;display:flex;z-index:100;max-width:480px;margin:0 auto}
.tab-btn{flex:1;padding:10px 0 14px;background:none;border:none;font-size:11px;color:#bbb;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px}
.tab-btn.active{color:#1a1a1a}
.tab-icon{font-size:22px;line-height:1}
.tab-page{display:none;padding:14px}
.header{text-align:center;padding:16px 0 10px;position:relative}
.header h1{font-size:21px;font-weight:600}
.header p{font-size:13px;color:#888;margin-top:4px}
.user-tag{display:inline-block;background:#f0efe9;border-radius:20px;padding:3px 10px;font-size:12px;color:#555;margin-top:6px}
.btn-change-user{position:absolute;top:16px;right:0;background:none;border:none;font-size:12px;color:#bbb;cursor:pointer;padding:4px}
.summary-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:12px 0}
.stat{background:#fff;border-radius:10px;padding:12px 8px;text-align:center;border:0.5px solid #e5e4e0}
.stat-label{font-size:11px;color:#888;margin-bottom:5px}
.stat-value{font-size:18px;font-weight:600;color:#1a1a1a}
.stat-value.money{font-size:14px}
.section-title{font-size:12px;font-weight:600;color:#888;margin:16px 0 8px;letter-spacing:0.06em;text-transform:uppercase}
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.menu-btn{background:#fff;border:0.5px solid #e5e4e0;border-radius:12px;padding:14px 12px;cursor:pointer;text-align:left;width:100%;transition:background 0.12s;position:relative}
.menu-btn:active{background:#f0efe9}
.menu-btn-name{font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:3px;padding-right:18px}
.menu-btn-price{font-size:12px;color:#888}
.menu-btn-count{font-size:11px;color:#4a90d9;margin-top:5px}
.menu-del{position:absolute;top:8px;right:8px;background:none;border:none;color:#bbb;cursor:pointer;font-size:14px;padding:0;line-height:1}
.log-list{display:flex;flex-direction:column;gap:6px;max-height:300px;overflow-y:auto}
.log-item{display:flex;align-items:center;justify-content:space-between;background:#fff;border:0.5px solid #e5e4e0;border-radius:10px;padding:10px 12px}
.log-item-name{font-size:13px;font-weight:500}
.log-item-date{font-size:11px;color:#aaa;margin-top:2px}
.log-item-price{font-size:13px;font-weight:600;margin-right:6px}
.log-item-del{background:none;border:none;color:#ccc;cursor:pointer;font-size:15px;padding:2px}
.add-panel{background:#fff;border:0.5px solid #e5e4e0;border-radius:14px;padding:14px;margin-top:4px}
.form-row{display:flex;gap:7px}
.form-row input{flex:1;font-size:14px;padding:9px 11px;border:0.5px solid #ddd;border-radius:9px;background:#f8f8f6;color:#1a1a1a;min-width:0;outline:none}
.form-row input:focus{border-color:#4a90d9}
.form-row input::placeholder{color:#bbb}
.price-input{width:110px;flex:none}
.btn-add{background:#1a1a1a;color:#fff;border:none;border-radius:9px;padding:9px 14px;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap}
.btn-add:active{opacity:0.8}
.btn-reset{display:block;width:100%;margin-top:14px;background:none;border:0.5px solid #ffb3b3;color:#e05050;border-radius:10px;padding:9px;font-size:12px;cursor:pointer}
.empty{text-align:center;padding:28px 0;color:#bbb;font-size:13px}
.divider{height:0.5px;background:#e8e7e3;margin:18px 0}
.report-month-nav{display:flex;align-items:center;justify-content:space-between;background:#fff;border-radius:12px;padding:10px 14px;border:0.5px solid #e5e4e0;margin-bottom:14px}
.month-nav-btn{background:none;border:none;font-size:20px;color:#888;cursor:pointer;padding:0 6px;line-height:1}
.month-nav-label{font-size:14px;font-weight:600}
.report-summary{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.report-stat{background:#fff;border-radius:10px;padding:12px;text-align:center;border:0.5px solid #e5e4e0}
.report-stat-label{font-size:11px;color:#888;margin-bottom:4px}
.report-stat-value{font-size:17px;font-weight:600}
.report-stat-sub{font-size:11px;color:#aaa;margin-top:3px}
.chart-card{background:#fff;border-radius:14px;padding:14px;border:0.5px solid #e5e4e0;margin-bottom:12px}
.chart-title{font-size:12px;font-weight:600;color:#888;margin-bottom:12px;letter-spacing:0.04em;text-transform:uppercase}
.bar-chart{display:flex;flex-direction:column;gap:8px}
.bar-row{display:flex;align-items:center;gap:8px}
.bar-label{font-size:12px;color:#555;width:70px;flex-shrink:0;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-wrap{flex:1;background:#f0efe9;border-radius:4px;height:22px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;background:#1a1a1a;transition:width 0.4s ease;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;min-width:2px}
.bar-val{font-size:11px;color:#fff;white-space:nowrap}
.bar-val.outside{color:#888;padding-left:6px;padding-right:0}
.compare-grid{display:flex;flex-direction:column;gap:8px}
.compare-row{display:flex;align-items:center;gap:8px}
.compare-month{font-size:12px;color:#555;width:52px;flex-shrink:0}
.compare-wrap{flex:1;background:#f0efe9;border-radius:4px;height:22px;overflow:hidden}
.compare-fill{height:100%;border-radius:4px;background:#4a90d9;transition:width 0.4s ease;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;min-width:2px}
.compare-fill.current{background:#1a1a1a}
.compare-val{font-size:11px;color:#fff;white-space:nowrap}
.dot-chart{display:flex;flex-direction:column;gap:6px}
.dot-row{display:flex;align-items:center;gap:6px}
.dot-day{font-size:11px;color:#aaa;width:34px;text-align:right;flex-shrink:0}
.dot-dots{display:flex;gap:3px;flex-wrap:wrap}
.dot{width:10px;height:10px;border-radius:50%;background:#1a1a1a;flex-shrink:0}
.dot.cafe{background:#4a90d9}
.dot-total{font-size:11px;color:#888;margin-left:4px}
.legend{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#666}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;border-radius:20px;padding:9px 20px;font-size:13px;opacity:0;transition:opacity 0.25s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:1000;align-items:flex-end;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:18px 18px 0 0;padding:24px 20px 32px;width:100%;max-width:480px;text-align:center}
.modal-title{font-size:16px;font-weight:600;margin-bottom:8px}
.modal-msg{font-size:14px;color:#666;margin-bottom:22px;line-height:1.5;white-space:pre-line}
.modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-btn{padding:13px;border-radius:12px;border:none;font-size:15px;font-weight:500;cursor:pointer}
.modal-btn.cancel{background:#f0efe9;color:#555}
.modal-btn.confirm{background:#e05050;color:#fff}
</style>
</head>
<body>

<div class="onboard" id="onboard">
  <div class="onboard-emoji">🍱</div>
  <h1>회사 식비 트래커</h1>
  <p>이름을 입력하면<br>나만의 기록이 저장돼요</p>
  <input type="text" id="name-input" placeholder="이름 입력 (예: 지훈)" maxlength="10" />
  <button class="onboard-btn" onclick="startApp()">시작하기</button>
</div>

<div class="app" id="main-app">

  <div class="tab-page" id="page-home" style="padding:14px">
    <div class="header">
      <h1>🍱 회사 식비 트래커</h1>
      <p id="today-date"></p>
      <div><span class="user-tag" id="user-tag"></span></div>
      <button class="btn-change-user" onclick="changeUser()">변경</button>
    </div>
    <div class="summary-grid">
      <div class="stat"><div class="stat-label">이번 달 횟수</div><div class="stat-value" id="stat-count">0</div></div>
      <div class="stat"><div class="stat-label">이번 달 합계</div><div class="stat-value money" id="stat-total">0원</div></div>
      <div class="stat"><div class="stat-label">전체 누적</div><div class="stat-value money" id="stat-all">0원</div></div>
    </div>
    <div class="section-title">메뉴 선택 (탭하면 기록됩니다)</div>
    <div class="menu-grid" id="menu-grid"></div>
    <div class="divider"></div>
    <div class="section-title">메뉴 추가</div>
    <div class="add-panel">
      <div class="form-row">
        <input type="text" id="new-name" placeholder="메뉴 이름" />
        <input type="number" id="new-price" placeholder="가격(원)" class="price-input" inputmode="numeric" />
        <button class="btn-add" onclick="addMenu()">추가</button>
      </div>
    </div>
    <div class="divider"></div>
    <div class="section-title">최근 기록</div>
    <div class="log-list" id="log-list"></div>
    <button class="btn-reset" onclick="askReset()">이번 달 기록 초기화</button>
  </div>

  <div class="tab-page" id="page-report" style="padding:14px">
    <div class="header" style="padding-top:16px">
      <h1>📊 리포트</h1>
    </div>
    <div class="report-month-nav">
      <button class="month-nav-btn" onclick="reportPrevMonth()">&#8249;</button>
      <span class="month-nav-label" id="report-month-label"></span>
      <button class="month-nav-btn" onclick="reportNextMonth()">&#8250;</button>
    </div>
    <div class="report-summary">
      <div class="report-stat">
        <div class="report-stat-label">총 지출</div>
        <div class="report-stat-value" id="r-total">0원</div>
        <div class="report-stat-sub" id="r-total-sub"></div>
      </div>
      <div class="report-stat">
        <div class="report-stat-label">이용 횟수</div>
        <div class="report-stat-value" id="r-count">0회</div>
        <div class="report-stat-sub" id="r-count-sub"></div>
      </div>
      <div class="report-stat">
        <div class="report-stat-label">일평균 지출</div>
        <div class="report-stat-value" id="r-avg">0원</div>
        <div class="report-stat-sub">이용일 기준</div>
      </div>
      <div class="report-stat">
        <div class="report-stat-label">가장 많이 쓴 메뉴</div>
        <div class="report-stat-value" style="font-size:13px" id="r-top">—</div>
        <div class="report-stat-sub" id="r-top-sub"></div>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-title">메뉴별 이용 횟수</div>
      <div class="bar-chart" id="chart-menu"></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">최근 6개월 지출 비교</div>
      <div class="compare-grid" id="chart-monthly"></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">일별 이용 내역</div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#1a1a1a"></div>식사</div>
        <div class="legend-item"><div class="legend-dot" style="background:#4a90d9"></div>카페</div>
      </div>
      <div class="dot-chart" id="chart-daily"></div>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" id="tab-home" onclick="switchTab('home')">
      <span class="tab-icon">🏠</span>홈
    </button>
    <button class="tab-btn" id="tab-report" onclick="switchTab('report')">
      <span class="tab-icon">📊</span>리포트
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-msg" id="modal-msg"></div>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeModal()">취소</button>
      <button class="modal-btn confirm" id="modal-confirm-btn">확인</button>
    </div>
  </div>
</div>

<script>
const DEFAULT_MENUS=[
  {id:'m1',name:'점심식사',price:8030},
  {id:'m2',name:'아이스 아메리카노',price:1300},
  {id:'m3',name:'아이스 아메리카노 샷추가',price:1800},
];
const PROTECTED=['m1','m2','m3'];
const CAFE_IDS=['m2','m3'];

let userName='',K_MENUS='',K_LOGS='';
let menus=[],logs=[];
let reportYM='';

function ls_get(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}}
function ls_set(k,v){localStorage.setItem(k,JSON.stringify(v))}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800)}
function fmt(iso){const d=new Date(iso);return d.getMonth()+1+'/'+d.getDate()+' '+d.getHours()+':'+String(d.getMinutes()).padStart(2,'0')}

// [FIX] 집계 기준: 전달 21일 ~ 해당월 20일
function thisMonth(){
  const d=new Date();
  const day=d.getDate();
  let y=d.getFullYear(),m=d.getMonth()+1;
  if(day>=21){m+=1;if(m>12){m=1;y++}}
  return y+'-'+String(m).padStart(2,'0');
}

// [FIX] 시작: 전달 21일 00:00, 종료: 해당월 20일 23:59:59
function inPeriod(iso,ym){
  const parts=ym.split('-').map(Number);
  const y=parts[0],m=parts[1];
  const d=new Date(iso);
  const start=new Date(y,m-2,21);
  const end=new Date(y,m-1,20,23,59,59,999);
  return d>=start&&d<=end;
}

// [FIX] 레이블: 전달 21일 ~ 해당월 20일
function periodLabel(ym){
  const parts=ym.split('-').map(Number);
  const y=parts[0],m=parts[1];
  const pm=m-1<1?12:m-1;
  const py=m-1<1?y-1:y;
  return py+'년 '+pm+'월 21일 ~ '+y+'년 '+m+'월 20일';
}

function countByMenu(id){return logs.filter(l=>l.menuId===id).length}
function ymShort(ym){return parseInt(ym.split('-')[1])+'월'}
function addMonths(ym,n){
  let parts=ym.split('-').map(Number);
  let y=parts[0],m=parts[1];
  m+=n;
  while(m>12){m-=12;y++}
  while(m<1){m+=12;y--}
  return y+'-'+String(m).padStart(2,'0');
}

function initUser(name){
  userName=name;
  K_MENUS='lct_'+name+'_menus';
  K_LOGS='lct_'+name+'_logs';
  menus=ls_get(K_MENUS,DEFAULT_MENUS);
  logs=ls_get(K_LOGS,[]);
}

function startApp(){
  const name=document.getElementById('name-input').value.trim();
  if(!name){showToast('이름을 입력해주세요');return}
  ls_set('lct_current_user',name);
  initUser(name);
  showMain();
}

function showMain(){
  document.getElementById('onboard').style.display='none';
  document.getElementById('main-app').style.display='block';
  document.getElementById('user-tag').textContent='👤 '+userName;
  document.getElementById('today-date').textContent=periodLabel(thisMonth());
  reportYM=thisMonth();
  switchTab('home');
}

function changeUser(){
  showModal('사용자 변경','이름을 변경할까요?\n현재 데이터는 그대로 유지됩니다.',function(){
    ls_set('lct_current_user','');
    document.getElementById('main-app').style.display='none';
    document.getElementById('onboard').style.display='flex';
    document.getElementById('name-input').value='';
  });
}

// [FIX] 탭 전환: 인라인 style.display만 사용해서 CSS 클래스 충돌 제거
function switchTab(tab){
  ['home','report'].forEach(function(t){
    document.getElementById('page-'+t).style.display=t===tab?'block':'none';
    document.getElementById('tab-'+t).classList.toggle('active',t===tab);
  });
  if(tab==='home') render();
  if(tab==='report') renderReport();
}

function render(){
  const grid=document.getElementById('menu-grid');
  grid.innerHTML='';
  menus.forEach(function(m){
    const cnt=countByMenu(m.id);
    const btn=document.createElement('button');
    btn.className='menu-btn';
    const del=!PROTECTED.includes(m.id)?'<button class="menu-del" onclick="event.stopPropagation();deleteMenu(\''+m.id+'\')">✕</button>':'';
    btn.innerHTML='<div class="menu-btn-name">'+escHtml(m.name)+del+'</div><div class="menu-btn-price">'+m.price.toLocaleString()+'원</div><div class="menu-btn-count">총 '+cnt+'회 이용</div>';
    btn.onclick=function(){addLog(m)};
    grid.appendChild(btn);
  });
  const ym=thisMonth();
  const ml=logs.filter(function(l){return inPeriod(l.date,ym)});
  document.getElementById('stat-count').textContent=ml.length;
  document.getElementById('stat-total').textContent=ml.reduce(function(s,l){return s+l.price},0).toLocaleString()+'원';
  document.getElementById('stat-all').textContent=logs.reduce(function(s,l){return s+l.price},0).toLocaleString()+'원';
  const list=document.getElementById('log-list');
  const recent=logs.slice().reverse().slice(0,40);
  if(!recent.length){list.innerHTML='<div class="empty">아직 기록이 없어요</div>';return}
  list.innerHTML=recent.map(function(l){
    return '<div class="log-item"><div><div class="log-item-name">'+escHtml(l.menuName)+'</div><div class="log-item-date">'+fmt(l.date)+'</div></div><div style="display:flex;align-items:center"><div class="log-item-price">'+l.price.toLocaleString()+'원</div><button class="log-item-del" onclick="deleteLog(\''+l.id+'\')">✕</button></div></div>';
  }).join('');
}

function reportPrevMonth(){reportYM=addMonths(reportYM,-1);renderReport()}
function reportNextMonth(){
  const next=addMonths(reportYM,1);
  if(next>thisMonth())return;
  reportYM=next;renderReport();
}

function renderReport(){
  document.getElementById('report-month-label').textContent=periodLabel(reportYM);
  const ml=logs.filter(function(l){return inPeriod(l.date,reportYM)});
  const total=ml.reduce(function(s,l){return s+l.price},0);
  const cnt=ml.length;

  const prevYM=addMonths(reportYM,-1);
  const prevTotal=logs.filter(function(l){return inPeriod(l.date,prevYM)}).reduce(function(s,l){return s+l.price},0);
  const diff=total-prevTotal;
  const diffStr=diff===0?'전월 동일':(diff>0?'전월 대비 +'+diff.toLocaleString()+'원':'전월 대비 '+diff.toLocaleString()+'원');
  document.getElementById('r-total').textContent=total.toLocaleString()+'원';
  document.getElementById('r-total-sub').textContent=diffStr;
  document.getElementById('r-count').textContent=cnt+'회';

  const prevCnt=logs.filter(function(l){return inPeriod(l.date,prevYM)}).length;
  const cntDiff=cnt-prevCnt;
  document.getElementById('r-count-sub').textContent=cntDiff===0?'전월 동일':(cntDiff>0?'전월 대비 +'+cntDiff+'회':'전월 대비 '+cntDiff+'회');

  const usedDays=ml.map(function(l){return l.date.slice(0,10)});
  const uniqueDays=usedDays.filter(function(v,i,a){return a.indexOf(v)===i}).length;
  document.getElementById('r-avg').textContent=uniqueDays?Math.round(total/uniqueDays).toLocaleString()+'원':'—';

  const menuCnt={};
  ml.forEach(function(l){menuCnt[l.menuName]=(menuCnt[l.menuName]||0)+1});
  const entries=Object.entries(menuCnt).sort(function(a,b){return b[1]-a[1]});
  const topMenu=entries[0];
  document.getElementById('r-top').textContent=topMenu?topMenu[0]:'—';
  document.getElementById('r-top-sub').textContent=topMenu?topMenu[1]+'회':'';

  renderMenuChart(ml);
  renderMonthlyChart();
  renderDailyChart(ml);
}

function renderMenuChart(ml){
  const cnt={};
  ml.forEach(function(l){
    if(!cnt[l.menuId]) cnt[l.menuId]={name:l.menuName,count:0};
    cnt[l.menuId].count++;
  });
  const items=Object.values(cnt).sort(function(a,b){return b.count-a.count});
  const max=items.length?items[0].count:1;
  const el=document.getElementById('chart-menu');
  if(!items.length){el.innerHTML='<div class="empty">기록 없음</div>';return}
  el.innerHTML=items.map(function(item){
    const pct=Math.round(item.count/max*100);
    const wide=pct>20;
    const label=escHtml(item.name.length>6?item.name.slice(0,6)+'…':item.name);
    return '<div class="bar-row"><div class="bar-label" title="'+escHtml(item.name)+'">'+label+'</div><div class="bar-wrap"><div class="bar-fill" style="width:'+pct+'%">'+(wide?'<span class="bar-val">'+item.count+'회</span>':'')+'</div></div>'+((!wide)?'<span class="bar-val outside">'+item.count+'회</span>':'')+'</div>';
  }).join('');
}

function renderMonthlyChart(){
  const months=[];
  for(let i=5;i>=0;i--) months.push(addMonths(reportYM,-i));
  const totals=months.map(function(ym){
    return {ym:ym,total:logs.filter(function(l){return inPeriod(l.date,ym)}).reduce(function(s,l){return s+l.price},0)};
  });
  const maxVal=Math.max.apply(null,totals.map(function(t){return t.total}).concat([1]));
  const el=document.getElementById('chart-monthly');
  el.innerHTML=totals.map(function(item){
    const pct=Math.round(item.total/maxVal*100);
    const isCurrent=item.ym===reportYM;
    const wide=pct>25;
    const fillW=Math.max(pct,item.total>0?3:0);
    return '<div class="compare-row"><div class="compare-month">'+ymShort(item.ym)+'</div><div class="compare-wrap"><div class="compare-fill'+(isCurrent?' current':'')+'" style="width:'+fillW+'%">'+(wide?'<span class="compare-val">'+item.total.toLocaleString()+'원</span>':'')+'</div></div>'+(!wide&&item.total>0?'<span style="font-size:11px;color:#888">'+item.total.toLocaleString()+'원</span>':(item.total===0?'<span style="font-size:11px;color:#ccc">—</span>':''))+'</div>';
  }).join('');
}

// [FIX] 날짜 키를 YYYY-MM-DD 전체로 사용 → 전달/이번달 일(day) 숫자 충돌 방지
function renderDailyChart(ml){
  const byDay={};
  ml.forEach(function(l){
    const dateKey=l.date.slice(0,10);
    if(!byDay[dateKey]) byDay[dateKey]=[];
    byDay[dateKey].push(l);
  });
  const el=document.getElementById('chart-daily');
  const days=Object.keys(byDay).sort();
  if(!days.length){el.innerHTML='<div class="empty">기록 없음</div>';return}
  el.innerHTML=days.map(function(dateKey){
    const d=new Date(dateKey+'T00:00:00');
    const label=(d.getMonth()+1)+'/'+d.getDate();
    const items=byDay[dateKey];
    const total=items.reduce(function(s,l){return s+l.price},0);
    const dots=items.map(function(l){
      const menuObj=menus.find(function(m){return m.id===l.menuId});
      const isCafe=CAFE_IDS.includes(l.menuId)||(menuObj&&(menuObj.name.includes('아메리카노')||menuObj.name.includes('카페')||menuObj.name.includes('라떼')||menuObj.name.includes('커피')));
      return '<div class="dot'+(isCafe?' cafe':'')+'" title="'+escHtml(l.menuName)+'"></div>';
    }).join('');
    return '<div class="dot-row"><div class="dot-day">'+label+'</div><div class="dot-dots">'+dots+'</div><div class="dot-total">'+total.toLocaleString()+'원</div></div>';
  }).join('');
}

function addLog(menu){
  logs.push({id:Date.now()+'',menuId:menu.id,menuName:menu.name,price:menu.price,date:new Date().toISOString()});
  ls_set(K_LOGS,logs);
  showToast(menu.name+' '+menu.price.toLocaleString()+'원 기록!');
  render();
}
function deleteLog(id){
  logs=logs.filter(function(l){return l.id!==id});
  ls_set(K_LOGS,logs);render();
}
function addMenu(){
  const name=document.getElementById('new-name').value.trim();
  const price=parseInt(document.getElementById('new-price').value);
  if(!name||isNaN(price)||price<=0){showToast('이름과 가격을 입력해주세요');return}
  menus.push({id:'m'+Date.now(),name:name,price:price});
  ls_set(K_MENUS,menus);
  document.getElementById('new-name').value='';
  document.getElementById('new-price').value='';
  showToast("'"+name+"' 메뉴 추가!");
  render();
}
function showModal(title,msg,onConfirm){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-msg').textContent=msg;
  document.getElementById('modal-confirm-btn').onclick=function(){closeModal();onConfirm()};
  document.getElementById('modal-bg').classList.add('show');
}
function closeModal(){document.getElementById('modal-bg').classList.remove('show')}
function deleteMenu(id){
  showModal('메뉴 삭제','이 메뉴를 삭제할까요?',function(){
    menus=menus.filter(function(m){return m.id!==id});
    ls_set(K_MENUS,menus);render();
  });
}
function askReset(){
  const ym=thisMonth();
  const label=periodLabel(ym);
  showModal('이번 달 초기화',label+'\n기록을 모두 삭제할까요?',function(){
    logs=logs.filter(function(l){return !inPeriod(l.date,ym)});
    ls_set(K_LOGS,logs);
    showToast('이번 달 기록이 초기화됐어요');render();
  });
}

const savedUser=ls_get('lct_current_user','');
if(savedUser){initUser(savedUser);showMain()}
else{document.getElementById('onboard').style.display='flex'}
document.getElementById('name-input').addEventListener('keydown',function(e){if(e.key==='Enter')startApp()});
</script>
